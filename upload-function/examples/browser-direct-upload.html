<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Upload Function Browser Example</title>
    <style>
      body {
        color: #1f2937;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        margin: 32px;
        max-width: 760px;
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        font-size: 14px;
        gap: 6px;
      }

      input,
      button,
      pre {
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font: inherit;
        padding: 10px 12px;
      }

      button {
        background: #111827;
        color: white;
        cursor: pointer;
        width: fit-content;
      }

      pre {
        min-height: 120px;
        overflow: auto;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Upload Function Browser Example</h1>

    <form id="upload-form">
      <label>
        Upload Function endpoint
        <input id="endpoint" value="http://localhost:8080" required />
      </label>

      <label>
        Image file
        <input id="file" type="file" accept="image/jpeg,image/png,image/webp" required />
      </label>

      <label>
        Auction house ID
        <input id="auction-house-id" value="425939177" required />
      </label>

      <label>
        Auction date
        <input id="auction-date" value="20260310" required />
      </label>

      <label>
        Lot ID
        <input id="lot-id" value="638775" required />
      </label>

      <label>
        Image ID
        <input id="image-id" value="195" required />
      </label>

      <label>
        Image variant suffix
        <input id="image-variant-suffix" placeholder="_1, _2, or blank for primary" />
      </label>

      <button type="submit">Upload</button>
    </form>

    <p id="status"></p>
    <pre id="result"></pre>

    <script type="module" src="./dist/browser-direct-upload.js"></script>
  </body>
</html>
